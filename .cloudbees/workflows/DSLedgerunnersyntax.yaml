apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow

on:
  workflow_dispatch:

# Workflow-level environment variables
env:
  GLOBAL_VAR: "production"
  APP_VERSION: "1.0.0"

jobs:
  setup:
    runs-on:
      - hari
      - os:darwin
    # Job-level environment variables
    env:
      JOB_ENV: "setup-environment"
      BUILD_TYPE: "release"
    steps:
      - name: Setup environment
        id: setup-step
        shell: sh
        env:
          STEP_VAR: "setup-value"
        run: |
          echo "Setting up environment"
          echo "Global var: $GLOBAL_VAR"
          echo "Job var: $JOB_ENV"
          echo "Step var: $STEP_VAR"
          echo "setup_output=configured" >> $CLOUDBEES_OUTPUTS/setup-step

      - name: Verify setup
        id: verify
        shell: sh
        run: |
          echo "Verifying setup from step: setup-step"
          echo "App version: $APP_VERSION"

  build:
    needs: setup  # This job depends on 'setup' job
    runs-on:
      - hari
      - os:darwin
    env:
      BUILD_ENV: "darwin-build"
    steps:
      - name: Say hello
        id: hello-step
        shell: sh
        run: |
          echo "hello world HARI"
          echo "Build type: $BUILD_TYPE"

      - name: Build application
        id: build-step
        shell: bash
        env:
          COMPILER: "gcc"
          FLAGS: "-O2"
        run: |
          echo "Building with $COMPILER"
          echo "Flags: $FLAGS"
          echo "Version: $APP_VERSION"

      - name: Run tests
        id: test-step
        shell: sh
        run: |
          echo "Running tests..."
          echo "Test environment: $BUILD_ENV"

  deploy:
    needs: build  # This job depends on 'build' job
    runs-on:
      - hari
      - os:darwin
    env:
      DEPLOY_TARGET: "staging"
      REGION: "us-west-2"
    steps:
      - name: Deploy to staging
        id: deploy-step
        shell: bash
        env:
          DEPLOY_USER: "admin"
        run: |
          echo "Deploying to $DEPLOY_TARGET"
          echo "Region: $REGION"
          echo "User: $DEPLOY_USER"
          echo "Version: $APP_VERSION"

      - name: Verify deployment
        id: verify-deploy
        shell: sh
        run: |
          echo "Verifying deployment in $REGION"
          echo "Deployment complete!"
