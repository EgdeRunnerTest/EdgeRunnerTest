apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow

on:
  workflow_dispatch:

jobs:
  build:
    runs-on:
      - hari
      - os:darwin
    steps:
      - name: Say hello
        id: hello-step
        shell: sh
        env:
          ENVIRONMENT: "staging"
          APP_VERSION: "1.0.0"
          BUILD_TYPE: "release"
        run: |
          echo "hello world HARI"
          echo "Environment: $ENVIRONMENT"
          echo "App version: $APP_VERSION"

      - name: Build application
        id: build-step
        shell: bash
        env:
          COMPILER: "gcc"
          FLAGS: "-O2"
          BUILD_ENV: "darwin-build"
          CI: ${{ vars.BUILD_CI }}
        run: |
          echo "Building with $COMPILER"
          echo "Flags: $FLAGS"
          echo "Build env: $BUILD_ENV"
          echo "CI Mode: $CI"

      - name: Run tests
        id: test-step
        shell: sh
        env:
          TEST_ENV: "staging"
          TEST_RUNNER: "pytest"
        run: |
          echo "Running tests..."
          echo "Test environment: $TEST_ENV"
          echo "Using runner: $TEST_RUNNER"

  deploy:
    needs: build
    runs-on:
      - hari
      - os:darwin
    steps:
      - name: Deploy application
        id: deploy-step
        shell: bash
        env:
          DEPLOY_TARGET: "staging"
          REGION: "us-west-2"
          DEPLOY_USER: "admin"
          VERSION: "1.0.0"
        run: |
          echo "Deploying to $DEPLOY_TARGET"
          echo "Region: $REGION"
          echo "User: $DEPLOY_USER"
          echo "Version: $VERSION"

      - name: Verify deployment
        id: verify-step
        shell: sh
        env:
          ENV: "staging"
          STATUS_CHECK: "enabled"
        run: |
          echo "Verifying deployment in $ENV"
          echo "Status check: $STATUS_CHECK"
          echo "Deployment complete!"

  notify:
    needs: deploy
    if: ${{ 'production' == 'staging' }}
    runs-on:
      - hari
      - os:darwin
    steps:
      - name: Send notification
        id: notify-step
        shell: sh
        env:
          NOTIFICATION_SERVICE: "slack"
          ENV: "staging"
          VERSION: "1.0.0"
          SLACK_WEBHOOK: 'dummy'
        run: |
          echo "Sending notification via $NOTIFICATION_SERVICE"
          echo "Deployment of version $VERSION to $ENV completed"
