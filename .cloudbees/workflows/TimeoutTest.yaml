apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [hari]
    timeout-minutes: 2  # Job will timeout after 2 minutes
    steps:
      - name: Say hello
        shell: sh
        run: |
          echo "hello world HARI"
          echo "Starting sleep for 5 minutes..."
          sleep 300  # Sleep for 5 minutes (300 seconds)
          echo "Sleep completed (you shouldn't see this)"
