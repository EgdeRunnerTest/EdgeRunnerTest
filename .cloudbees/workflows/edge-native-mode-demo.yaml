apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: edge-native-mode-demo

on:
  workflow_dispatch :

env:
  GLOBAL_VAR: "hello-from-workflow"
  APP_VERSION: "1.0.${{ cloudbees.run_attempt }}"

jobs:
  build:
    runs-on: [LinuxEc2]
    env:
      JOB_ENV: "build-job"
    outputs:
      build_status: ${{ steps.compile.outputs.status }}
    steps:
      - name: Print context
        id: context
        shell: bash
        env:
          RUN_ID: ${{ cloudbees.run_id }}
          BRANCH: ${{ cloudbees.scm.branch }}
        run: |
          echo "Run ID: $RUN_ID"
          echo "Branch: $BRANCH"
          echo "Global var: $GLOBAL_VAR"
          echo "App version: $APP_VERSION"

      - name: Compile
        id: compile
        shell: bash
        run: |
          echo "Compiling..."
           echo "success" >> "$CLOUDBEES_OUTPUTS/status"
      

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          echo "Running tests..."
          exit 0

      - name: Skip step via expression
        id: skip-example
        if: ${{ false }}
        shell: bash
        run: |
          echo "This only runs on production dispatches"

  

  deploy:
    runs-on: [LinuxEc2]
    needs: build
    if: ${{ needs.build.outputs.build_status == 'success' }}
    steps:
      - name: Notify
        id: notify
        shell: sh
        kind: build
        run: |
          echo "Deployment complete for $GLOBAL_VAR"
